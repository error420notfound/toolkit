<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .line {
      width: 120px;
      height: 1px;
      background: #ffffff;
      margin-top: 8px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="content">
      <span>Hello World</span>
      <div class="content"><span>toolkit</span></div>
    </div>
  </div>
</body>
</html>
